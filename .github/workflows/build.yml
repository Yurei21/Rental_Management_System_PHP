name: Laravel Lint & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  lint:
    name: PHP Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, bcmath, gd
          coverage: none

      # 3️⃣ Install Composer dependencies
      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      # 4️⃣ PHP built-in syntax check
      - name: PHP syntax check
        run: find . -name "*.php" -exec php -l {} \;

      # 5️⃣ Install PHP_CodeSniffer and PHPStan
      - name: Install PHP_CodeSniffer and PHPStan
        run: |
          composer global require "squizlabs/php_codesniffer=*"
          composer global require "phpstan/phpstan:^1.10"

      # 6️⃣ Code style check (PSR12)
      - name: Run PHP_CodeSniffer (PSR12)
        run: ~/.composer/vendor/bin/phpcs --standard=PSR12 app/ bootstrap/ routes/

      # 7️⃣ Static analysis with PHPStan
      - name: Run PHPStan (Level 5)
        run: ~/.composer/vendor/bin/phpstan analyse app/ bootstrap/ --level=5